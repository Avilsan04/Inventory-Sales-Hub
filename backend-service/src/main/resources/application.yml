spring:
  application:
    name: inventory-sales-hub
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev} # Default to dev if not specified

  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    hikari:
      maximum-pool-size: ${DB_POOL_MAX:20}
      minimum-idle: ${DB_POOL_MIN:5}
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false # CRITICAL: Disables the Open Session in View anti-pattern
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 50
          order_inserts: true
          order_updates: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

# Custom Configuration Properties (Must be mapped via @ConfigurationProperties)
app:
  security:
    jwt:
      secret: ${JWT_SECRET} # No fallback here. If missing in prod, app crashes (fail-fast).
      expiration-ms: ${JWT_EXPIRATION_MS:21600000}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:*}

# Observability
management:
  endpoints:
    web:
      exposure:
        include: health, metrics
  endpoint:
    health:
      show-details: always

---
# Development Profile (Active by default locally)
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:postgresql://localhost:5432/inventory_sales_hub
    username: postgres
    password: postgres

app:
  security:
    jwt:
      secret: "dev-only-secret-key-must-be-at-least-32-chars-long"
  cors:
    allowed-origins: "http://localhost:5173,http://localhost:8081" # React Web & React Native Metro

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    com.inventorysaleshub: DEBUG
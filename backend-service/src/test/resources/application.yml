spring:
  application:
    name: inventory-sales-hub-test

  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop

  flyway:
    enabled: false

jwt:
  secret: test-secret-key-must-be-at-least-32-characters-long-for-hs256-algo
  expiration-ms: 3600000

cors:
  allowed-origins: http://localhost:5173

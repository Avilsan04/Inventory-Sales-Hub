name: CI

on:
  push:
    branches: [main, Sergio-Front]
    paths:
      - 'frontend-web/**'
  pull_request:
    branches: [main]
    paths:
      - 'frontend-web/**'

defaults:
  run:
    working-directory: frontend-web

jobs:
  ci:
    name: Type-check · Lint · Test · Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Diagnostics
        run: node --version && npm --version
        working-directory: ${{ github.workspace }}

      - name: Install dependencies
        run: npm ci --ignore-scripts
        working-directory: ${{ github.workspace }}

      - name: Install rollup Linux binary
        run: npm install --ignore-scripts --no-save --no-package-lock @rollup/rollup-linux-x64-gnu

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Test (with coverage)
        run: npm run test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: frontend-web/coverage/
          retention-days: 7

      - name: Build
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npx playwright test --reporter=html

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: frontend-web/playwright-report/
          retention-days: 7
